name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        working-directory: DS4MacOS
        run: |
          xcodebuild \
            -project DS4.xcodeproj \
            -scheme DS4 \
            -configuration Release \
            -derivedDataPath ./build \
            build

      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - \
            DS4MacOS/build/Build/Products/Release/ds4-server-gui.app

      - name: Package
        run: |
          cd DS4MacOS/build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent \
            ds4-server-gui.app \
            ds4-server-gui-${{ github.ref_name }}-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds4-server-gui-${{ github.ref_name }}-macos-arm64
          path: DS4MacOS/build/Build/Products/Release/ds4-server-gui-${{ github.ref_name }}-macos-arm64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DS4MacOS/build/Build/Products/Release/ds4-server-gui-${{ github.ref_name }}-macos-arm64.zip
